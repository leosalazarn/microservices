# WARNING: Credentials here are for LOCAL DEVELOPMENT only.
# In production, never hardcode secrets — use Vault or a secrets manager.

services:

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-network

  products:
    build:
      context: .
      dockerfile: products/Dockerfile
    container_name: products-service
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: "8080"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_USERNAME: admin
      SPRING_DATA_MONGODB_PASSWORD: ${MONGO_PASSWORD:-password}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      SPRING_CLOUD_VAULT_ENABLED: "false"
    depends_on:
      - eureka-server
      - mongodb
      - kafka
      - redis
    networks:
      - microservices-network

  billing:
    build:
      context: .
      dockerfile: billing/Dockerfile
    container_name: billing-service
    ports:
      - "8082:8080"
    environment:
      SERVER_PORT: "8080"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_USERNAME: admin
      SPRING_DATA_MONGODB_PASSWORD: ${MONGO_PASSWORD:-password}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_CLOUD_VAULT_ENABLED: "false"
    depends_on:
      - eureka-server
      - mongodb
      - kafka
    networks:
      - microservices-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CLOUD_VAULT_ENABLED: "false"
    depends_on:
      - eureka-server
    networks:
      - microservices-network
  mongodb:
    image: mongo:latest
    container_name: mongodb-poc
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    volumes:
      - mongodb_data:/data/db
    networks:
      - microservices-network

  kafka:
    image: apache/kafka:latest
    container_name: kafka-poc
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092'
      KAFKA_LISTENERS: 'CONTROLLER://:19093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:19093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: '/var/kafka-logs'
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/kafka-logs
    networks:
      - microservices-network
    user: "0:0"

  vault:
    image: hashicorp/vault:latest
    container_name: vault-poc
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-myroot}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
      - vault_config:/vault/config
    networks:
      - microservices-network
    command: [ "vault", "server", "-dev" ]

  redis:
    image: redis:7-alpine
    container_name: redis-poc
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redis_data:/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mongodb_data:
    driver: local
  kafka_data:
    driver: local
  vault_data:
    driver: local
  vault_config:
    driver: local
  redis_data:
    driver: local

networks:
  microservices-network:
    driver: bridge
